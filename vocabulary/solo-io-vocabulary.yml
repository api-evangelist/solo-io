vocabulary:
  name: Solo.io Vocabulary
  description: >-
    Domain vocabulary for Solo.io's cloud-native API management and service
    connectivity platform, covering Gloo Gateway, Gloo Mesh, developer portal,
    and Envoy-based infrastructure concepts.
  created: "2026-05-02"
  modified: "2026-05-02"
  tags:
    - API Gateway
    - Cloud Native
    - Envoy Proxy
    - Service Mesh
    - Solo.io

  terms:

    - term: Upstream
      category: Gateway Resource
      definition: >-
        A backend service destination registered with Gloo Gateway. Upstreams
        represent the services that the gateway routes traffic to, including
        Kubernetes services, static hosts, AWS Lambda functions, and other
        function providers.
      relatedTerms:
        - Virtual Service
        - Route Table
        - Envoy Cluster

    - term: Virtual Service
      category: Gateway Resource
      definition: >-
        A Gloo gateway resource that defines routing rules, security policies,
        and traffic management settings for incoming requests. Virtual services
        bind domains to routes and upstreams.
      relatedTerms:
        - Route
        - Upstream
        - Gateway
        - Route Table

    - term: Route Table
      category: Gateway Resource
      definition: >-
        A modular routing configuration resource that enables delegated routing
        across teams and namespaces. Route tables are referenced by virtual
        services and enable multi-team API management.
      relatedTerms:
        - Virtual Service
        - Route
        - Upstream

    - term: Proxy
      category: Gateway Resource
      definition: >-
        The compiled Envoy proxy configuration generated by the Gloo control
        plane from virtual services, upstreams, and other gateway resources.
        Represents the xDS configuration pushed to Envoy instances.
      relatedTerms:
        - Upstream
        - Virtual Service
        - Envoy Proxy

    - term: Gateway
      category: Gateway Resource
      definition: >-
        A Gloo resource that defines listener configurations, including bind
        address, port, TLS settings, and the virtual services served on each
        listener. Corresponds to an Envoy listener.
      relatedTerms:
        - Virtual Service
        - Proxy
        - Listener

    - term: API Product
      category: Developer Portal
      definition: >-
        A curated, versioned API surface exposed through the Gloo developer
        portal. API products aggregate API versions and associate them with
        usage plans for developer access.
      relatedTerms:
        - API Version
        - Usage Plan
        - API Key

    - term: API Version
      category: Developer Portal
      definition: >-
        A specific versioned release of an API product with an associated
        schema type (OpenAPI, GraphQL, or gRPC). Developers can view and
        consume different API versions through the portal.
      relatedTerms:
        - API Product
        - Schema Type

    - term: Usage Plan
      category: Developer Portal
      definition: >-
        A rate limiting policy and quota configuration defining the terms under
        which developers can access API products. Usage plans specify
        requests-per-unit limits with time units (second, minute, hour, day).
      relatedTerms:
        - API Key
        - API Product
        - Rate Limiting

    - term: API Key
      category: Developer Portal
      definition: >-
        An authentication credential generated by a developer for accessing
        an API product under a specific usage plan. API keys are single-use
        secrets returned only at creation time.
      relatedTerms:
        - Usage Plan
        - API Product

    - term: Envoy Proxy
      category: Infrastructure
      definition: >-
        The open-source L7 proxy that powers Gloo Gateway. Envoy handles all
        data plane traffic and receives its configuration via the xDS protocol
        from the Gloo control plane.
      relatedTerms:
        - Proxy
        - xDS
        - Upstream

    - term: Gloo Mesh
      category: Product
      definition: >-
        Solo.io's enterprise service mesh management plane built on Istio,
        providing multi-cluster service mesh configuration, observability,
        and policy management across cloud environments.
      relatedTerms:
        - Istio
        - Service Mesh
        - Multi-Cluster

    - term: Gloo Portal
      category: Product
      definition: >-
        The developer portal component of Gloo Platform, providing a
        self-service interface for developers to discover APIs, manage API
        keys, and review usage plans.
      relatedTerms:
        - API Product
        - API Key
        - Usage Plan

    - term: Resource Metadata
      category: Data Model
      definition: >-
        Kubernetes-style metadata attached to Gloo gateway resources, including
        name, namespace, cluster, labels, annotations, and resourceVersion for
        optimistic concurrency control.
      relatedTerms:
        - Resource Status
        - Upstream
        - Virtual Service

    - term: Resource Status
      category: Data Model
      definition: >-
        The current reconciliation state of a Gloo gateway resource, expressed
        as Pending, Accepted, Rejected, or Warning, along with the reporting
        component and reason.
      relatedTerms:
        - Resource Metadata

    - term: Bearer Token
      category: Authentication
      definition: >-
        An OAuth 2.0 JWT bearer token obtained through the Gloo Portal OIDC
        login flow, used to authenticate requests to the Portal Server API.
      relatedTerms:
        - OIDC
        - API Key

    - term: OIDC
      category: Authentication
      definition: >-
        OpenID Connect, the identity protocol used by Gloo Portal for
        authenticating developer portal users via external identity providers.
      relatedTerms:
        - Bearer Token
        - ExtAuthPolicy

    - term: ExtAuthPolicy
      category: Security
      definition: >-
        A Gloo gateway policy that configures external authentication for
        virtual services, supporting OIDC, API key validation, OPA, and
        custom external auth servers.
      relatedTerms:
        - OIDC
        - API Key
        - Virtual Service

    - term: xDS
      category: Infrastructure
      definition: >-
        The Envoy discovery service protocol used by the Gloo control plane
        to push configuration (listeners, clusters, routes, endpoints) to
        Envoy proxy instances.
      relatedTerms:
        - Envoy Proxy
        - Proxy

    - term: Rate Limiting
      category: Traffic Management
      definition: >-
        A traffic control mechanism enforced by Gloo Gateway to limit request
        rates for API consumers based on usage plan policies, headers, or
        custom descriptors.
      relatedTerms:
        - Usage Plan
        - Virtual Service

    - term: Gloo Control Plane
      category: Infrastructure
      definition: >-
        The management component that translates Gloo gateway custom resources
        (upstreams, virtual services, route tables) into Envoy xDS configuration
        and distributes it to all managed proxy instances.
      relatedTerms:
        - Envoy Proxy
        - xDS
        - Proxy
